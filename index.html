<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yogesh's Mega Quiz Hub - V19.34.1 (Laxmikanth Edition)</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['"Nunito Sans"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] } } }
        }
    </script>
    <style>
        body { font-family: 'Nunito Sans', sans-serif; user-select: none; transition: background-color 0.3s, color 0.3s; }
        .subject-card, .mamba-card { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .subject-card:hover, .mamba-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        
        .palette-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 12px; font-weight: 700; border: 2px solid; transition: all 0.2s; cursor: pointer; }
        .palette-unanswered { background-color: #f1f5f9; border-color: #cbd5e1; color: #475569; }
        .dark .palette-unanswered { background-color: #334155; border-color: #475569; color: #cbd5e1; }
        .palette-answered { background-color: #10b981; border-color: #10b981; color: white; }
        .palette-marked { background-color: #a855f7; border-color: #a855f7; color: white; }
        .palette-answered-marked { background-color: #10b981; border-color: #a855f7; color: white; border-width: 3px; }
        .palette-active { box-shadow: 0 0 0 3px #fbbf24; transform: scale(1.1); }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }

        mark { background-color: rgba(251, 191, 36, 0.4); color: inherit; padding: 0 2px; border-radius: 4px; font-weight: 900; box-shadow: 0 0 8px rgba(251, 191, 36, 0.3); }
        .dark mark { background-color: rgba(245, 158, 11, 0.5); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-[#0a0f1c] dark:text-slate-200 min-h-screen flex flex-col pb-20">

    <input type="file" id="global-file-input" accept=".json, .txt" class="hidden">
    <input type="file" id="backup-file-input" accept=".json" class="hidden">

    <div id="screen-dashboard" class="max-w-[1400px] mx-auto p-4 sm:p-6 pt-10 flex-1 w-full block">
        <header class="bg-slate-900 dark:bg-slate-900 text-white rounded-[2rem] p-6 sm:p-10 mb-10 shadow-2xl relative overflow-hidden border border-slate-800 group">
            <div class="absolute inset-0 bg-cover bg-center opacity-60 dark:opacity-70 transition-transform duration-1000 group-hover:scale-105" style="background-image: url('wp2550249-kobe-bryant-wallpaper.jpg'); pointer-events: none;"></div>
            <div class="absolute inset-0 bg-gradient-to-r from-slate-900/80 via-slate-900/50 to-transparent dark:from-[#0a0f1c]/90 dark:via-[#0a0f1c]/60 pointer-events-none"></div>

            <div id="sync-status" class="absolute top-6 right-6 text-[10px] font-black uppercase tracking-widest px-4 py-1.5 rounded-full bg-slate-800/80 text-slate-400 border border-slate-700 flex items-center gap-2 z-20 backdrop-blur-md shadow-lg">
                <span id="sync-dot" class="w-2 h-2 rounded-full bg-slate-500"></span> <span id="sync-text">Connecting...</span>
            </div>

            <div class="relative z-10 flex flex-col xl:flex-row justify-between items-start xl:items-center gap-6">
                <div>
                    <h1 class="text-3xl sm:text-4xl lg:text-5xl font-black uppercase tracking-tight text-emerald-400 mb-2">
                        Yogesh's Mega Quiz Hub
                        <span class="text-xs text-slate-900 bg-amber-400 px-2 py-1 rounded ml-2">V19.34.1</span>
                    </h1>
                    <p class="text-slate-300 font-bold">Laxmikanth Optimized Master Setup</p>
                </div>
                
                <div class="flex items-center gap-3 flex-wrap">
                    <button onclick="toggleDarkMode()" class="bg-white/10 hover:bg-white/20 p-4 rounded-2xl transition-all">🌙</button>
                    <button onclick="openDBManager()" class="bg-blue-600 hover:bg-blue-500 text-white font-black px-5 py-4 rounded-2xl transition-all">🗄️ Master DB</button>
                    <button onclick="openTargetRadar()" class="bg-rose-600 hover:bg-rose-500 text-white font-black px-5 py-4 rounded-2xl transition-all">🎯 Target Radar</button>
                    <button onclick="showAnalytics()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-black px-5 py-4 rounded-2xl transition-all">📊 Analytics</button>
                </div>
            </div>

            <div class="w-full mt-10 relative z-10">
                <input type="text" id="omni-search" oninput="performSearch(this.value)" placeholder="Omni-Search: Find any question, formula, or topic..." class="w-full pl-6 pr-14 py-5 bg-white/95 dark:bg-slate-900/90 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-white rounded-2xl shadow-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all font-bold text-lg">
            </div>
        </header>

        <div id="search-results-container" class="hidden mb-16 space-y-6"></div>

        <div id="dashboard-main-content">
            <div onclick="openSRSModal()" class="bg-gradient-to-r from-purple-600 to-indigo-700 rounded-[2rem] p-8 mb-10 cursor-pointer shadow-xl hover:-translate-y-1 transition-all flex justify-between items-center text-white">
                <div>
                    <h2 class="text-3xl font-black mb-2">🔥 Spaced Repetition Engine</h2>
                    <p class="font-bold opacity-90">Launch targeted 10-Q Sprints strictly isolated by your Tags.</p>
                </div>
                <div id="global-srs-badge" class="bg-rose-500 px-4 py-2 rounded-full font-black hidden">0 Due</div>
                <div class="text-3xl font-black">→</div>
            </div>

            <div id="dashboard-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8 mb-16"></div>
        </div>
    </div>

    <div id="screen-target-radar" class="hidden max-w-[1400px] mx-auto p-6 w-full flex-1"></div>
    <div id="screen-db-manager" class="hidden max-w-6xl mx-auto p-6 w-full flex-1"></div>
    <div id="screen-lobby" class="hidden max-w-3xl mx-auto p-8 w-full flex-1"></div>
    <div id="screen-quiz" class="hidden max-w-6xl mx-auto p-6 w-full flex-1"></div>
    <div id="screen-results" class="hidden max-w-5xl mx-auto p-6 w-full flex-1"></div>

    <div id="screen-srs-modal" class="hidden fixed inset-0 z-[200] bg-slate-900/90 backdrop-blur-sm flex justify-center items-center p-4"></div>
    <div id="screen-analytics" class="hidden fixed inset-0 z-[100] bg-slate-900/80 flex justify-center items-center p-4"></div>
    <div id="screen-edit-modal" class="hidden fixed inset-0 z-[200] bg-slate-900/90 flex justify-center items-center p-4"></div>

<script>
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbyuAFvjWZHAlkDx00DsDoHiPgFMq-CmGgHKyQXq_6cfi1QwmnwUVp3ZNLrtpnLPhOXB/exec";
    
    // THE BRAIN - UPDATED SYLLABUS MAP
    const SYLLABUS_MAP = {
        "Arithmetic": ["Number System", "LCM & HCF", "Percentages", "Profit, Loss & Discount", "Simple & Compound Interest", "Ratio & Proportion", "Partnership & Ages", "Mixture & Alligation", "Average", "Time & Work", "Time, Speed & Distance"],
        "Advanced Maths": ["Algebra", "Geometry", "Coordinate Geometry", "Mensuration 2D", "Mensuration 3D", "Trigonometry", "Heights & Distances", "Probability & Statistics"],
        "Reasoning": ["Analogy & Classification", "Number & Letter Series", "Coding-Decoding", "Blood Relations", "Direction & Distance", "Syllogism", "Order & Ranking", "Clock & Calendar", "Venn Diagrams", "Missing Number & Matrix", "Non-Verbal Reasoning", "Logical Reasoning"],
        "English": ["Active & Passive Voice", "Cloze Test", "Direct & Indirect Speech", "Figures of Speech", "Grammar & Error Spotting", "HOMONYMS", "Idioms & Phrases", "One Word Substitution", "Para Jumbles", "PREPOSITION", "Phrasal Verbs", "Reading Comprehension", "Sentence Improvement", "Spelling Errors", "Synonyms & Antonyms"],
        "Ancient History": ["Prehistoric & Indus Valley", "Vedic Age", "Buddhism & Jainism", "Mahajanapadas & Magadha", "Mauryan Empire", "Post-Mauryan Period", "Gupta Empire", "Post-Gupta & Harsha"],
        "Medieval History": ["Early Medieval India", "Delhi Sultanate", "Provincial Kingdoms", "Mughal Empire", "Maratha Empire", "Bhakti & Sufi Movements"],
        "Modern History": ["Advent of Europeans", "British Expansion & Policies", "Revolt of 1857", "Socio-Religious Reform Movements", "Indian National Congress", "Gandhian Era", "Revolutionary Nationalism", "Partition & Independence", "Post-Independence Consolidation"],
        "Art & Culture": ["Architecture & Sculpture", "Paintings", "Music & Dance", "Puppetry & Theatre", "Languages & Literature", "Fairs, Festivals & Handicrafts", "Indian Philosophy"],
        "Geography": ["Geomorphology", "Climatology", "Oceanography", "Indian Physical Geography", "Indian Drainage System", "Indian Climate, Soil & Vegetation", "Economic Geography", "Human & Demographic Geography"],
        "Polity": [
            "Making, Preamble & Sources",
            "Union, Territory & Citizenship",
            "Fundamental Rights",
            "DPSP & Fundamental Duties",
            "Union Executive",
            "Parliament",
            "State Govt & Legislature",
            "Judiciary",
            "Local Govt (Panchayats & Municipalities)",
            "Emergency Provisions",
            "Constitutional & Non-Constitutional Bodies",
            "Elections, Amendments & Schedules",
            "Special Provisions & Anti-Defection"
        ],
        "Economics": ["National Income & Growth", "Inflation & Business Cycle", "Money & Banking", "Budget, Taxation & Fiscal Policy", "Financial Markets", "Agriculture & Land Reforms", "Industry & Infrastructure", "External Sector", "International Organizations", "Poverty, Inequality & Employment"],
        "Physics": ["Units & Measurements", "Mechanics", "Gravitation", "Properties of Matter", "Heat & Thermodynamics", "Waves & Sound", "Optics", "Electricity & Magnetism", "Modern Physics"],
        "Chemistry": ["Matter & Its States", "Atomic Structure & Periodic Table", "Chemical Bonding & Reactions", "Acids, Bases & Salts", "Metals, Non-Metals & Metallurgy", "Carbon & Organic Compounds", "Chemistry in Everyday Life"],
        "Biology": ["Cell Biology", "Classification of Organisms", "Human Anatomy & Physiology", "Plant Morphology & Physiology", "Genetics & Evolution", "Human Diseases & Defense Mechanisms", "Nutrition & Vitamins"],
        "Computer Knowledge": ["Computer Fundamentals & History", "Hardware & Software", "Operating Systems", "MS Office", "Internet & Networking", "Cyber Security & Threats", "Keyboard Shortcuts & Abbreviations"]
    };

    let db = {}; 
    let historyDb = [];
    let mistakesDb = []; 
    let currentQuizId = null;
    let activeQuestions = [];
    let quizState = { answers: {}, submitted: false, currentFocus: 0 };

    // --- CORE LOGIC FUNCTIONS ---
    async function initializeSystem() {
        showSync('Connecting...', 'slate-500');
        try {
            const resp = await fetch(CLOUD_URL + "?action=get");
            const data = await resp.json();
            db = data.db || {};
            historyDb = data.history || [];
            mistakesDb = data.mistakes || [];
            renderDashboard();
            showSync('Synced with Cloud', 'emerald-500');
        } catch (e) {
            console.error(e);
            showSync('Offline Mode', 'amber-500');
        }
    }

    function showSync(txt, color) {
        document.getElementById('sync-text').innerText = txt;
        document.getElementById('sync-dot').className = `w-2 h-2 rounded-full bg-${color}`;
    }

    async function saveData() {
        showSync('Saving...', 'blue-500');
        try {
            await fetch(CLOUD_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: 'save', db, history: historyDb, mistakes: mistakesDb })
            });
            showSync('Saved', 'emerald-500');
        } catch (e) { showSync('Save Error', 'rose-500'); }
    }

    function renderDashboard() {
        const grid = document.getElementById('dashboard-grid');
        grid.innerHTML = "";
        
        const subjects = Object.keys(SYLLABUS_MAP);
        subjects.forEach(sub => {
            const quizzes = Object.keys(db).filter(id => db[id].subject === sub && !db[id].title.includes("🎯") && !db[id].title.includes("Master Mock"));
            
            const card = document.createElement('div');
            card.className = "subject-card bg-white dark:bg-slate-800 rounded-3xl p-6 shadow-lg border border-slate-100 dark:border-slate-700";
            card.innerHTML = `
                <h3 class="text-xl font-black mb-4 flex justify-between items-center">
                    ${sub}
                    <span class="bg-slate-100 dark:bg-slate-700 px-3 py-1 rounded-full text-xs">${quizzes.length} Quizzes</span>
                </h3>
                <div class="space-y-2">
                    ${quizzes.map(id => `
                        <div onclick="startLobby('${id}')" class="p-3 bg-slate-50 dark:bg-slate-900 rounded-xl cursor-pointer hover:bg-emerald-50 dark:hover:bg-emerald-900/20 transition-all font-bold text-sm">
                            ${db[id].title}
                        </div>
                    `).join('')}
                    <button onclick="triggerImport('${sub}')" class="w-full py-2 border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-xl text-xs font-black opacity-50 hover:opacity-100 transition-all">+ Import ${sub}</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function triggerImport(sub) {
        window.targetSub = sub;
        document.getElementById('global-file-input').click();
    }

    document.getElementById('global-file-input').onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = async (ev) => {
            const data = JSON.parse(ev.target.result);
            const id = 'q_' + Date.now();
            db[id] = {
                title: data.title || "New Quiz",
                subject: window.targetSub,
                questions: data.questions
            };
            await saveData();
            renderDashboard();
        };
        reader.readAsText(file);
    };

    function startLobby(id) {
        currentQuizId = id;
        document.getElementById('screen-dashboard').classList.add('hidden');
        document.getElementById('screen-lobby').classList.remove('hidden');
        document.getElementById('screen-lobby').innerHTML = `
            <div class="bg-white dark:bg-slate-800 rounded-[2.5rem] p-10 shadow-2xl">
                <button onclick="backToHome()" class="mb-6 font-black text-slate-400">← BACK</button>
                <h2 class="text-4xl font-black mb-2">${db[id].title}</h2>
                <p class="text-slate-400 mb-8 font-bold">${db[id].questions.length} Questions • ${db[id].subject}</p>
                <button onclick="launchQuiz()" class="w-full py-6 bg-emerald-500 text-white rounded-3xl font-black text-2xl shadow-xl hover:scale-[1.02] transition-all">START QUIZ</button>
            </div>
        `;
    }

    function launchQuiz() {
        activeQuestions = [...db[currentQuizId].questions];
        quizState = { answers: {}, marked: {}, currentFocus: 0, submitted: false };
        document.getElementById('screen-lobby').classList.add('hidden');
        document.getElementById('screen-quiz').classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        const q = activeQuestions[quizState.currentFocus];
        const container = document.getElementById('screen-quiz');
        container.innerHTML = `
            <div class="max-w-4xl mx-auto">
                <div class="flex justify-between items-center mb-8">
                    <span class="font-black text-2xl">Q${quizState.currentFocus + 1}/${activeQuestions.length}</span>
                    <button onclick="submitQuiz()" class="bg-rose-500 text-white px-6 py-2 rounded-full font-black">SUBMIT</button>
                </div>
                <div class="bg-white dark:bg-slate-800 p-8 rounded-[2rem] shadow-xl mb-6">
                    <p class="text-xl font-bold mb-8">${q.question}</p>
                    <div class="grid gap-4">
                        ${q.options.map((opt, i) => `
                            <div onclick="selectOption(${i})" class="p-5 rounded-2xl border-2 cursor-pointer transition-all font-bold ${quizState.answers[quizState.currentFocus] === i ? 'border-emerald-500 bg-emerald-50' : 'border-slate-100 dark:border-slate-700'}">
                                ${opt.text}
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="flex justify-between">
                    <button onclick="prevQ()" class="font-black p-4">PREV</button>
                    <button onclick="nextQ()" class="font-black p-4">NEXT</button>
                </div>
            </div>
        `;
    }

    function selectOption(i) {
        if(quizState.submitted) return;
        quizState.answers[quizState.currentFocus] = i;
        renderQuestion();
    }

    function nextQ() { if(quizState.currentFocus < activeQuestions.length -1) { quizState.currentFocus++; renderQuestion(); } }
    function prevQ() { if(quizState.currentFocus > 0) { quizState.currentFocus--; renderQuestion(); } }

    function submitQuiz() {
        quizState.submitted = true;
        document.getElementById('screen-quiz').classList.add('hidden');
        document.getElementById('screen-results').classList.remove('hidden');
        
        let correct = 0;
        activeQuestions.forEach((q, idx) => {
            const ans = quizState.answers[idx];
            if(ans !== undefined && q.options[ans].correct) correct++;
            else {
                mistakesDb.push({ ...q, quizTitle: db[currentQuizId].title, date: new Date().toISOString() });
            }
        });

        document.getElementById('screen-results').innerHTML = `
            <div class="text-center">
                <h2 class="text-6xl font-black mb-4">${Math.round((correct/activeQuestions.length)*100)}%</h2>
                <p class="text-2xl font-bold mb-10">Score: ${correct} / ${activeQuestions.length}</p>
                <button onclick="backToHome()" class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black">EXIT TO HOME</button>
            </div>
        `;
        saveData();
    }

    function backToHome() {
        document.querySelectorAll('div[id^="screen-"]').forEach(s => s.classList.add('hidden'));
        document.getElementById('screen-dashboard').classList.remove('hidden');
    }

    function toggleDarkMode() {
        document.documentElement.classList.toggle('dark');
    }

    // --- DATABASE MANAGER ---
    function openDBManager() {
        document.getElementById('screen-dashboard').classList.add('hidden');
        document.getElementById('screen-db-manager').classList.remove('hidden');
        const container = document.getElementById('screen-db-manager');
        container.innerHTML = `
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-4xl font-black">🗄️ Master Database</h2>
                <button onclick="backToHome()" class="font-black text-slate-400">CLOSE</button>
            </div>
            <div class="grid gap-4">
                ${Object.keys(db).map(id => `
                    <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl flex justify-between items-center shadow-sm">
                        <span class="font-bold">${db[id].title} (${db[id].subject})</span>
                        <button onclick="deleteQuiz('${id}')" class="text-rose-500 font-black">DELETE</button>
                    </div>
                `).join('')}
            </div>
        `;
    }

    async function deleteQuiz(id) {
        if(confirm('Delete this quiz forever?')) {
            delete db[id];
            await saveData();
            openDBManager();
            renderDashboard();
        }
    }

    function openTargetRadar() {
        document.getElementById('screen-dashboard').classList.add('hidden');
        document.getElementById('screen-target-radar').classList.remove('hidden');
        const container = document.getElementById('screen-target-radar');
        
        let tagStats = {};
        Object.keys(db).forEach(id => {
            db[id].questions.forEach(q => {
                if(q.tags && q.tags[1]) {
                    const tag = q.tags[1];
                    tagStats[tag] = (tagStats[tag] || 0) + 1;
                }
            });
        });

        container.innerHTML = `
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-4xl font-black text-rose-500">🎯 Target Radar</h2>
                <button onclick="backToHome()" class="font-black text-slate-400">CLOSE</button>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                ${Object.entries(tagStats).map(([tag, count]) => `
                    <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl text-center shadow-md">
                        <div class="text-3xl font-black text-slate-900 dark:text-white mb-1">${count}</div>
                        <div class="text-xs font-black uppercase text-slate-400">${tag}</div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    window.onload = initializeSystem;
</script>
</body>
</html>
