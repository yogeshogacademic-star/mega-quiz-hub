<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mamba Deep-Scan Upgrader</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; text-align: center; padding: 50px; }
        .box { background: #1e293b; padding: 40px; border-radius: 20px; max-width: 750px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h1 { color: #10b981; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        p { color: #94a3b8; line-height: 1.6; margin-bottom: 30px; font-size: 15px; }
        input[type="file"] { display: none; }
        .btn { background: #10b981; color: #064e3b; padding: 15px 30px; font-size: 16px; font-weight: 900; border-radius: 12px; cursor: pointer; border: none; text-transform: uppercase; }
        #status { margin-top: 25px; font-size: 14px; font-weight: bold; background: #0f172a; padding: 20px; border-radius: 10px; text-align: left; max-height: 300px; overflow-y: auto;}
        .success { color: #10b981; display:block; margin-bottom:4px; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🐍 V10.22 Master Upgrader</h1>
        <p>Uses the Option-Scanner to build an Iron Wall between Quant and GS.</p>
        <label class="btn">
            📂 Upload Original Backup File
            <input type="file" id="fileInput" accept=".json">
        </label>
        <div id="status">Awaiting backup...</div>
    </div>

    <script>
        function determineTag(qObj, quizTitle, quizSubject) {
            let text = (qObj.question + " " + (qObj.solution || "")).toLowerCase();
            let options = qObj.options || [];
            
            // PILLAR 1: OPTION SCANNER (Math vs GS)
            let mathOptCount = 0;
            options.forEach(opt => {
                let txt = (opt.text || "").toLowerCase();
                if (/[\d\.\/%₹x²x³√=]/.test(txt) || /^(rs|cm|m|km|kg|sec|min|hrs|days)/.test(txt)) mathOptCount++;
            });
            
            let isMath = (quizSubject || "").toUpperCase().includes('QUANT') || 
                         (quizTitle || "").toLowerCase().includes('quant') || 
                         (options.length > 0 && mathOptCount >= (options.length / 2));

            // PILLAR 2: STRICT MULTI-WORD MATCHING
            if (isMath) {
                if (/\b(piece of work|days to complete|time and work|working together|efficiency|can complete the work)\b/i.test(text)) return "Time & Work";
                if (/\b(speed|km\/h|train|relative speed|distance between)\b/i.test(text)) return "Speed, Time & Distance";
                if (/\b(profit|loss|discount|cost price|selling price|marked price|dishonest dealer)\b/i.test(text)) return "Profit, Loss & Discount";
                if (/\b(simple interest|compound interest|compounded annually|rate per annum)\b/i.test(text)) return "Simple & Compound Interest";
                if (/\b(ratio of their ages|ratio of the ages|mixture|alloy|milk and water)\b/i.test(text)) return "Ratio, Proportion & Ages";
                if (/\b(percentage|percent reduction|percent increase)\b/i.test(text) || text.includes('%')) return "Percentage";
                if (/\b(average|mean)\b/i.test(text)) return "Average";
                if (/\b(partnership|invested|business with rs)\b/i.test(text)) return "Partnership";
                if (/\b(triangle|circle|collinear|hexagon|angle bisector|chord|tangent)\b/i.test(text)) return "Geometry";
                if (/\b(volume|surface area|cone|cylinder|sphere|pyramid|prism)\b/i.test(text)) return "Mensuration (2D & 3D)";
                if (/\b(sin|cos|tan|cosec|sec|cot|trigonometry)\b/i.test(text)) return "Trigonometry";
                if (/\b(polynomial|quadratic|algebra|x²|x³)\b/i.test(text)) return "Algebra";
                if (/\b(lcm|hcf|divisibility|remainder|perfect square|recurring decimal)\b/i.test(text)) return "Number System & Simplification";
                return "Miscellaneous Quant Topics";
            } else {
                if (/\b(supreme court|high court|district judge|writ of|habeas corpus|mandamus|certiorari|quo warranto|prohibition|public interest litigation|lok adalat)\b/i.test(text)) return "Judiciary (SC, HC, Subordinate)";
                if (/\b(parliament|president of india|prime minister|lok sabha|rajya sabha)\b/i.test(text)) return "Union Executive & Legislature";
                if (/\b(article \d+|amendment to the constitution|schedule)\b/i.test(text)) return "Articles, Schedules & Amendments";
                if (/\b(fundamental right|dpsp|directive principle|fundamental duty)\b/i.test(text)) return "Fundamental Rights, Duties & DPSP";
                
                if (/\b(gst|goods and services tax|fiscal deficit|revenue deficit|customs duty|excise duty|cess|surcharge|direct tax|indirect tax)\b/i.test(text)) return "Budget, Taxation & Fiscal Policy";
                if (/\b(economic planning|mahalanobis|niti aayog|five year plan)\b/i.test(text)) return "Economic Planning & NITI Aayog";

                if (/\b(sex ratio|census 2011|population density)\b/i.test(text)) return "Census & Demographics";
                if (/\b(river|drainage|tributary|himalayan river|wainganga)\b/i.test(text)) return "Indian Drainage System";

                if (/\b(total internal reflection|refraction|mirror|lens)\b/i.test(text)) return "Optics (Light)";
                if (/\b(hormone|gland|thyroid|pituitary|testes|disease)\b/i.test(text)) return "Human Anatomy & Physiology";

                if (/\b(ecological efficiency|food chain|trophic level|ecosystem)\b/i.test(text)) return "Ecology & Ecosystem";

                if (/\b(olympic|fide|chess federation|gold medallist|sport)\b/i.test(text)) return "Sports & Trophies";
                if (/\b(hornbill festival|losar|pongal|mela)\b/i.test(text)) return "Festivals & Fairs";
                if (/\b(united nations|agency|opec|who|ilo)\b/i.test(text)) return "International Organizations & HQ";

                if (/\b(pradhan mantri|yojana|abhiyan|scheme|prayas)\b/i.test(text)) return "Government Schemes & Portals";

                return "Miscellaneous GS Topics";
            }
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = "<span style='color:#fbbf24'>Executing Iron Wall Deep-Scan...</span><br><br>";
            
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    let data = JSON.parse(event.target.result);
                    data.version = "v10.22"; 
                    let memory = {}; 

                    if(data.db) {
                        Object.keys(data.db).forEach(quizId => {
                            let quiz = data.db[quizId];
                            
                            // Safely fix the array bug without losing the name
                            if (Array.isArray(quiz)) {
                                let realTitle = (quiz[0] && quiz[0].category) ? quiz[0].category : "QUANT MOCK 1";
                                let realSubj = realTitle.toUpperCase().includes("QUANT") ? "QUANT MOCK QUESTIONS" : "GS MOCK QUESTIONS";
                                data.db[quizId] = { title: realTitle, subject: realSubj, timeInMinutes: 20, questions: quiz };
                                quiz = data.db[quizId];
                            }

                            if(quiz.questions) {
                                quiz.questions.forEach(q => {
                                    let tag = determineTag(q, quiz.title, quiz.subject);
                                    q.tags = [tag];
                                    if (q.solution) {
                                        q.solution = q.solution.split('<br><br><b>Tags:</b>')[0];
                                        q.solution = q.solution.split('<br><b>Tags:</b>')[0];
                                        q.solution += "<br><br><b>Tags:</b> #" + tag.replace(/[^a-zA-Z0-9]/g, '');
                                    }
                                    memory[q.question.trim().substring(0,30)] = tag;
                                });
                                statusEl.innerHTML += `<span class='success'>[LOCKED] ${quiz.title}</span>`;
                            }
                        });
                    }
                    
                    if(data.history) {
                        data.history.forEach(attempt => {
                            if(attempt.reviewData) {
                                attempt.reviewData.forEach(q => {
                                    let key = q.question.trim().substring(0,30);
                                    let tag = memory[key] || determineTag(q, attempt.title, attempt.subject);
                                    q.tags = [tag];
                                    if(q.solution) {
                                        q.solution = q.solution.split('<br><br><b>Tags:</b>')[0];
                                        q.solution = q.solution.split('<br><b>Tags:</b>')[0];
                                        q.solution += "<br><br><b>Tags:</b> #" + tag.replace(/[^a-zA-Z0-9]/g, '');
                                    }
                                });
                            }
                        });
                        statusEl.innerHTML += `<span class='success'>[HISTORY SYNCED] Perfectly Mapped.</span>`;
                    }
                    
                    if(data.mistakes) {
                        data.mistakes.forEach(q => {
                            let key = q.question.trim().substring(0,30);
                            let tag = memory[key] || determineTag(q, "", "");
                            q.tags = [tag];
                            if(q.solution) {
                                q.solution = q.solution.split('<br><br><b>Tags:</b>')[0];
                                q.solution = q.solution.split('<br><b>Tags:</b>')[0];
                                q.solution += "<br><br><b>Tags:</b> #" + tag.replace(/[^a-zA-Z0-9]/g, '');
                            }
                        });
                        statusEl.innerHTML += `<span class='success'>[MISTAKES SYNCED] Perfectly Mapped.</span>`;
                    }

                    const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
                    const a = document.createElement('a'); 
                    a.href = URL.createObjectURL(blob); 
                    a.download = `Yogesh_MegaHub_V10.22_Flawless.json`; 
                    a.click();
                    
                    statusEl.innerHTML += `<br><span class='success' style='font-size:18px;'>🎉 FLAWLESS UPGRADE COMPLETE!</span><br><span style='color:#94a3b8;'>File Downloaded. Update your index.html next!</span>`;
                } catch (err) {
                    statusEl.innerHTML += `<br><span class='error'>❌ Error: Invalid JSON File.</span>`;
                    console.error(err);
                }
            };
            reader.readAsText(file);
        });
    </script>
</body>
</html>
