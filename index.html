<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yogesh's Mega Quiz Hub - V10.22 (Final Subject Segregation)</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['"Nunito Sans"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] } } }
        }
    </script>
    <style>
        body { font-family: 'Nunito Sans', sans-serif; user-select: none; transition: background-color 0.3s, color 0.3s; }
        .subject-card, .mamba-card { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .subject-card:hover, .mamba-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        .palette-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 12px; font-weight: 700; border: 2px solid; transition: all 0.2s; cursor: pointer; }
        .palette-unanswered { background-color: #f1f5f9; border-color: #cbd5e1; color: #475569; }
        .dark .palette-unanswered { background-color: #334155; border-color: #475569; color: #cbd5e1; }
        .palette-answered { background-color: #10b981; border-color: #10b981; color: white; }
        .palette-marked { background-color: #a855f7; border-color: #a855f7; color: white; }
        .palette-answered-marked { background-color: #10b981; border-color: #a855f7; color: white; border-width: 3px; }
        .palette-active { box-shadow: 0 0 0 3px #fbbf24; transform: scale(1.1); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-[#0a0f1c] dark:text-slate-200 min-h-screen flex flex-col pb-20">

    <input type="file" id="global-file-input" accept=".json, .txt" class="hidden">
    <input type="file" id="backup-file-input" accept=".json" class="hidden">

    <div id="screen-dashboard" class="max-w-[1400px] mx-auto p-4 sm:p-6 pt-10 flex-1 w-full block">
        <header class="bg-slate-900 text-white rounded-[2rem] p-6 sm:p-10 mb-10 shadow-2xl relative overflow-hidden border border-slate-800 group">
            <div class="absolute inset-0 bg-cover bg-center opacity-60 transition-transform duration-1000 group-hover:scale-105" style="background-image: url('wp2550249-kobe-bryant-wallpaper.jpg'); pointer-events: none;"></div>
            <div class="absolute inset-0 bg-gradient-to-r from-slate-900/90 via-slate-900/60 to-transparent pointer-events-none"></div>

            <div class="relative z-10 flex flex-col xl:flex-row justify-between items-start xl:items-center gap-6">
                <div>
                    <h1 class="text-3xl sm:text-4xl lg:text-5xl font-black uppercase tracking-tight text-emerald-400 mb-2 drop-shadow-lg">
                        Yogesh's Mega Hub <span class="text-xs text-slate-900 bg-amber-400 px-2 py-1 rounded">V10.22</span>
                    </h1>
                    <p class="text-slate-300 font-bold text-sm tracking-wide">Context-Locked Segregation Engine Active</p>
                </div>
                <div class="flex gap-4">
                    <button onclick="toggleDarkMode()" class="bg-white/10 hover:bg-white/20 p-4 rounded-2xl backdrop-blur-md transition-all">🌙</button>
                    <button onclick="showAnalytics()" class="bg-gradient-to-br from-indigo-500 to-indigo-600 text-white font-black px-8 py-4 rounded-2xl shadow-lg transition-transform hover:-translate-y-1">📈 Skill Matrix</button>
                </div>
            </div>

            <div class="w-full mt-10 relative group z-10">
                <input type="text" id="omni-search" oninput="performSearch(this.value)" placeholder="Search the Mamba Vault..." class="w-full pl-16 pr-14 py-5 bg-white/95 dark:bg-slate-900/90 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-white rounded-2xl shadow-xl focus:ring-2 focus:ring-emerald-500 font-bold text-lg">
            </div>
        </header>

        <div id="search-results-container" class="hidden mb-16 max-w-5xl mx-auto space-y-6"></div>

        <div id="dashboard-main-content">
            <div id="dashboard-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8 mb-16"></div>
            
            <div class="mt-auto text-center pb-10 border-t border-slate-200 dark:border-slate-800/50 pt-10">
                <div class="flex justify-center gap-4 flex-wrap">
                    <button onclick="exportBackup()" class="bg-blue-50 text-blue-700 dark:bg-blue-900/20 dark:text-blue-400 font-black text-[10px] uppercase tracking-widest px-6 py-4 rounded-xl shadow-sm border border-blue-100">💾 Backup</button>
                    <button onclick="triggerRestore()" class="bg-amber-50 text-amber-700 dark:bg-amber-900/20 dark:text-amber-400 font-black text-[10px] uppercase tracking-widest px-6 py-4 rounded-xl shadow-sm border border-amber-100">📂 Restore 🔒</button>
                    <button onclick="factoryReset()" class="bg-red-50 text-red-700 dark:bg-red-900/20 dark:text-red-400 font-black text-[10px] uppercase tracking-widest px-6 py-4 rounded-xl shadow-sm border border-red-100">⚠️ Reset 🔒</button>
                </div>
            </div>
        </div>
    </div>

    <div id="screen-lobby" class="hidden max-w-3xl mx-auto p-6 pt-10 w-full flex-1">
        <div class="bg-white dark:bg-slate-900 rounded-[2rem] p-10 shadow-2xl border border-slate-200 dark:border-slate-800 relative overflow-hidden">
            <button onclick="showScreen('dashboard')" class="text-slate-400 font-black uppercase text-[10px] mb-8">← Back</button>
            <h2 id="lobby-title" class="text-4xl font-black text-slate-800 dark:text-slate-100 mb-8">Quiz Title</h2>
            <button onclick="startQuizFromLobby()" class="w-full bg-emerald-500 text-white font-black text-xl py-5 rounded-2xl shadow-lg hover:-translate-y-1 transition-all">LAUNCH EXAM</button>
        </div>
    </div>

    <div id="screen-quiz" class="hidden max-w-6xl mx-auto p-4 pt-6 relative w-full flex-1">
        <div class="flex justify-between items-center bg-white/80 dark:bg-slate-900/80 backdrop-blur-md p-4 px-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 mb-6 sticky top-4 z-50">
            <button onclick="showScreen('dashboard');" class="text-slate-400 font-bold text-[10px] uppercase">← Abort</button>
            <div id="quiz-timer" class="font-mono font-black text-2xl text-emerald-500">00:00</div>
            <button onclick="submitQuiz()" class="bg-emerald-500 text-white px-6 py-2 rounded-xl font-black text-xs uppercase">Submit</button>
        </div>
        <div id="quiz-container" class="space-y-8"></div>
    </div>

    <div id="screen-results" class="hidden max-w-5xl mx-auto p-4 sm:p-6 pt-10 w-full flex-1">
        <div class="bg-white dark:bg-slate-900 rounded-[2rem] p-6 md:p-10 shadow-2xl border border-slate-200 dark:border-slate-800">
            <h2 class="text-3xl font-black uppercase text-slate-800 dark:text-slate-100 mb-10">Performance Report</h2>
            <div id="revision-container" class="space-y-6"></div>
            <button onclick="showScreen('dashboard')" class="mt-10 bg-slate-900 text-white px-12 py-4 rounded-xl font-black uppercase">Home</button>
        </div>
    </div>

    <div id="screen-analytics" class="hidden fixed inset-0 z-[100] bg-slate-900/80 backdrop-blur-sm flex justify-center items-center p-4">
        <div class="bg-white dark:bg-slate-900 rounded-3xl p-6 md:p-8 shadow-2xl w-full max-w-5xl max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black uppercase text-slate-800 dark:text-slate-100">SSC Skill Matrix</h2>
                <button onclick="closeAnalytics()" class="text-slate-400 font-black text-3xl">&times;</button>
            </div>
            <div class="flex-1 overflow-y-auto pr-2" id="mastery-grid"></div>
        </div>
    </div>

<script>
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbyuAFvjWZHAlkDx00DsDoHiPgFMq-CmGgHKyQXq_6cfi1QwmnwUVp3ZNLrtpnLPhOXB/exec";
    
    // RESTORED ALL 15 CORE SUBJECTS + MOCKS
    let SUBJECTS = ["Ancient History", "Medieval History", "Modern History", "Geography", "Economics", "Static GK", "Arithmetic", "Advanced Maths", "English", "Reasoning", "Current Affairs", "Polity", "Science", "Environment", "Miscellaneous", "GS MOCK QUESTIONS", "QUANT MOCK QUESTIONS"];
    let db = {}; 
    let historyDb = [];
    let mistakesDb = []; 
    let currentQuizId = null;
    let quizState = { answers: {}, interval: null };

    // AUTH
    window.requireAuth = (cb) => { const p = prompt("Password:"); if(p==="KOBE") cb(); else alert("Denied"); };

    // SYSTEM CORE
    function saveData() {
        localStorage.setItem('megaQuizDB_v22', JSON.stringify(db));
        localStorage.setItem('megaQuizHistory_v22', JSON.stringify(historyDb));
        const payload = { subjects: SUBJECTS, db: db, history: historyDb, version: "v10.22" };
        fetch(CLOUD_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    }

    function loadLocal() {
        if (localStorage.getItem('megaQuizDB_v22')) db = JSON.parse(localStorage.getItem('megaQuizDB_v22'));
        if (localStorage.getItem('megaQuizHistory_v22')) historyDb = JSON.parse(localStorage.getItem('megaQuizHistory_v22'));
    }

    // DASHBOARD RENDERING
    function renderDashboard() {
        const grid = document.getElementById('dashboard-grid'); grid.innerHTML = '';
        
        SUBJECTS.forEach(subject => {
            const subjectQuizzes = Object.keys(db).filter(id => db[id].subject === subject);
            let listHTML = '';
            
            subjectQuizzes.forEach(id => {
                listHTML += `
                    <div onclick="openLobby('${id}')" class="mt-2 bg-slate-50 dark:bg-slate-800 p-3 border border-slate-200 dark:border-slate-700 rounded-xl cursor-pointer hover:border-emerald-400">
                        <div class="font-bold text-slate-800 dark:text-slate-200 text-sm truncate">${db[id].title}</div>
                        <div class="text-[9px] font-black text-slate-400 uppercase mt-1">${db[id].questions.length} Qs</div>
                    </div>`;
            });

            const card = document.createElement('div'); card.className = `bg-white dark:bg-slate-900 rounded-3xl p-6 shadow-lg border border-slate-200 dark:border-slate-800 flex flex-col subject-card`;
            card.innerHTML = `
                <h2 class="text-lg font-black text-slate-800 dark:text-slate-100 uppercase tracking-tight mb-4 border-b border-slate-100 pb-2">${subject}</h2>
                <div class="flex-1 overflow-y-auto max-h-64 space-y-1 mb-4">${listHTML || '<div class="text-[10px] text-slate-400">No quizzes</div>'}</div>
                <button onclick="triggerImport('${subject}')" class="w-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 font-black text-[10px] uppercase py-3 rounded-xl">Add Quiz 🔒</button>`;
            grid.appendChild(card);
        });
    }

    // MATRIX LOGIC
    window.showAnalytics = () => {
        document.getElementById('screen-analytics').classList.remove('hidden');
        const stats = {};
        const ordered = ["Arithmetic", "Advanced Maths", "English", "Polity", "Economics", "Geography", "Ancient History", "Medieval History", "Modern History", "Science", "Environment", "Static GK", "Current Affairs", "Miscellaneous"];
        ordered.forEach(s => stats[s] = { correct: 0, total: 0, topics: {} });

        historyDb.forEach(h => {
            if(!h.reviewData) return;
            h.reviewData.forEach(rd => {
                const tag = (rd.tags && rd.tags[0]) || "General";
                
                // INTERNAL SUBJECT ROUTING
                let targetSub = h.subject;
                if(h.subject === "GS MOCK QUESTIONS") {
                    if(["Percentage","Profit, Loss & Discount","Time & Work","Speed, Time & Distance","Ratio, Proportion & Ages"].includes(tag)) targetSub = "Arithmetic";
                    else if(["Algebra","Geometry","Trigonometry"].includes(tag)) targetSub = "Advanced Maths";
                    else if(tag.includes("Judiciary") || tag.includes("Article")) targetSub = "Polity";
                    else if(tag.includes("Tax") || tag.includes("Economics")) targetSub = "Economics";
                    else if(tag.includes("Drainage") || tag.includes("Census")) targetSub = "Geography";
                    else if(tag.includes("Sport") || tag.includes("Static")) targetSub = "Static GK";
                }
                
                if(!ordered.includes(targetSub)) targetSub = "Miscellaneous";

                if(!stats[targetSub].topics[tag]) stats[targetSub].topics[tag] = { correct: 0, total: 0 };
                stats[targetSub].topics[tag].total++;
                stats[targetSub].total++;
                if(rd.status === 'correct') { stats[targetSub].topics[tag].correct++; stats[targetSub].correct++; }
            });
        });

        let matrixHTML = '';
        ordered.forEach(sub => {
            if(stats[sub].total === 0) return;
            let subAcc = Math.round((stats[sub].correct / stats[sub].total) * 100);
            let topicsHTML = '';
            Object.keys(stats[sub].topics).forEach(tag => {
                let acc = Math.round((stats[sub].topics[tag].correct / stats[sub].topics[tag].total) * 100);
                let color = acc >= 80 ? 'bg-emerald-100 text-emerald-700' : acc >= 50 ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-700';
                topicsHTML += `<button onclick="startTopicQuiz('${sub}', '${tag}')" class="px-3 py-1.5 m-1 text-[10px] font-black uppercase rounded-lg ${color}">${tag} (${acc}%)</button>`;
            });
            matrixHTML += `<div class="mb-6 p-5 bg-slate-50 dark:bg-slate-800 rounded-2xl">
                <div class="flex justify-between mb-4"><span class="font-black uppercase">${sub}</span><span class="font-black">${subAcc}%</span></div>
                <div class="flex flex-wrap">${topicsHTML}</div></div>`;
        });
        document.getElementById('mastery-grid').innerHTML = matrixHTML || '<div class="text-center py-10">No data found</div>';
    };

    // UI NAVIGATION
    function showScreen(s) { ['dashboard','lobby','quiz','results'].forEach(x=>document.getElementById('screen-'+x).classList.add('hidden')); document.getElementById('screen-'+s).classList.remove('hidden'); }
    window.openLobby = (id) => { currentQuizId = id; document.getElementById('lobby-title').textContent = db[id].title; showScreen('lobby'); };
    window.closeAnalytics = () => document.getElementById('screen-analytics').classList.add('hidden');
    function formatTime(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }

    // FILE HANDLING
    window.triggerImport = (sub) => { targetImportSubject = sub; requireAuth(() => document.getElementById('global-file-input').click()); };
    document.getElementById('global-file-input').addEventListener('change', e => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = event => {
            const quiz = JSON.parse(event.target.result); quiz.subject = targetImportSubject;
            db['q_'+Date.now()] = quiz; saveData(); renderDashboard();
        }; reader.readAsText(file);
    });

    window.triggerRestore = () => requireAuth(() => document.getElementById('backup-file-input').click());
    document.getElementById('backup-file-input').addEventListener('change', e => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = event => {
            const b = JSON.parse(event.target.result); db = b.db; historyDb = b.history;
            saveData(); location.reload();
        }; reader.readAsText(file);
    });

    // INITIALIZE
    loadLocal(); renderDashboard();
</script>
</body>
</html>
