<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yogesh's Mega Hub - V10.8 (Interactive Matrix Edition)</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['"Nunito Sans"', 'sans-serif'] } } }
        }
    </script>
    <style>
        body { font-family: 'Nunito Sans', sans-serif; user-select: none; transition: background-color 0.3s; }
        .subject-card { transition: transform 0.3s, box-shadow 0.3s; }
        .subject-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-[#0a0f1c] dark:text-slate-200 min-h-screen pb-20">

    <input type="file" id="global-file-input" accept=".json" class="hidden">
    <input type="file" id="backup-file-input" accept=".json" class="hidden">

    <div id="screen-dashboard" class="max-w-[1400px] mx-auto p-4 pt-10">
        <header class="bg-slate-900 text-white rounded-[2rem] p-10 mb-10 shadow-2xl relative overflow-hidden border border-slate-800">
            <div id="sync-status" class="absolute top-6 right-6 text-[10px] font-black uppercase tracking-widest px-4 py-1.5 rounded-full bg-slate-800/80 text-slate-400 border border-slate-700 flex items-center gap-2 z-20 backdrop-blur-md shadow-lg">
                <span class="w-2 h-2 rounded-full bg-slate-500 animate-pulse"></span> Connecting...
            </div>
            
            <div class="relative z-10 flex flex-col xl:flex-row justify-between items-center gap-6">
                <div>
                    <h1 class="text-4xl md:text-5xl font-black uppercase tracking-tight text-emerald-400">Yogesh's Mega Hub <span class="text-xs text-slate-900 bg-amber-400 px-2 py-1 rounded align-top">V10.8</span></h1>
                    <p class="text-slate-300 font-bold text-sm mt-2 tracking-widest uppercase">Targeted Topic Engine & Anti-Bleed Matrix</p>
                </div>
                <div class="flex gap-4">
                    <button onclick="toggleDarkMode()" class="bg-white/10 hover:bg-white/20 p-4 rounded-2xl backdrop-blur-md transition-colors">🌙</button>
                    <button onclick="showAnalytics()" class="bg-gradient-to-br from-indigo-500 to-indigo-600 hover:from-indigo-400 hover:to-indigo-500 text-white font-black px-8 py-4 rounded-2xl shadow-lg transition-transform hover:scale-105">📈 Global Matrix</button>
                </div>
            </div>
        </header>

        <div id="dashboard-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8"></div>
        
        <div class="mt-20 flex justify-center gap-4 border-t border-slate-200 dark:border-slate-800 pt-10">
            <button onclick="exportBackup()" class="bg-blue-50 text-blue-700 hover:bg-blue-100 dark:bg-blue-900/20 dark:text-blue-400 font-black px-8 py-4 rounded-xl text-[10px] uppercase tracking-widest border border-blue-100 dark:border-blue-900/30 transition-colors">💾 Backup</button>
            <button onclick="triggerRestore()" class="bg-amber-50 text-amber-700 hover:bg-amber-100 dark:bg-amber-900/20 dark:text-amber-400 font-black px-8 py-4 rounded-xl text-[10px] uppercase tracking-widest border border-amber-100 dark:border-amber-900/30 transition-colors">📂 Restore 🔒</button>
        </div>
    </div>

    <div id="screen-lobby" class="hidden max-w-3xl mx-auto p-10 mt-10 bg-white dark:bg-slate-900 rounded-[2rem] shadow-2xl border border-slate-200 dark:border-slate-800">
        <button onclick="showScreen('dashboard')" class="text-slate-400 hover:text-emerald-500 font-black text-[10px] uppercase tracking-widest mb-8 transition-colors">← Back to Hub</button>
        <h2 id="lobby-title" class="text-4xl font-black mb-8 text-slate-800 dark:text-slate-100"></h2>
        <button onclick="startQuizFromLobby()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-black py-5 rounded-2xl text-xl shadow-lg transition-all tracking-widest uppercase">Launch Exam</button>
    </div>

    <div id="screen-quiz" class="hidden max-w-4xl mx-auto p-4 sm:p-6">
        <div id="quiz-container" class="space-y-8"></div>
        <button onclick="submitQuiz()" class="mt-10 w-full bg-slate-900 dark:bg-emerald-500 text-white dark:text-slate-900 py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl hover:scale-[1.02] transition-transform">Submit Final Test</button>
    </div>

    <div id="screen-analytics" class="hidden fixed inset-0 z-[100] bg-slate-900/90 backdrop-blur-sm flex justify-center items-center p-4">
        <div class="bg-white dark:bg-slate-900 rounded-3xl p-8 w-full max-w-5xl max-h-[90vh] overflow-y-auto shadow-2xl border border-slate-200 dark:border-slate-800">
            <div class="flex justify-between items-center mb-8 border-b border-slate-100 dark:border-slate-800 pb-4">
                <h2 class="text-2xl font-black uppercase tracking-tight text-slate-800 dark:text-slate-100">Global Topic Analytics</h2>
                <button onclick="closeAnalytics()" class="text-4xl text-slate-400 hover:text-red-500 transition-colors">&times;</button>
            </div>
            <div id="mastery-grid" class="space-y-6"></div>
        </div>
    </div>

<script>
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbyuAFvjWZHAlkDx00DsDoHiPgFMq-CmGgHKyQXq_6cfi1QwmnwUVp3ZNLrtpnLPhOXB/exec";
    
    let SUBJECTS = ["Ancient History", "Medieval History", "Modern History", "Geography", "Economics", "Static GK", "Arithmetic", "Advanced Maths", "English", "Reasoning", "Current Affairs", "Polity", "Science", "Environment", "Miscellaneous", "GS MOCK QUESTIONS", "QUANT MOCK QUESTIONS"];
    let db = {}; let historyDb = []; let currentQuizId = null; let activeQuestions = []; let quizState = { answers: {} };

    // SYNC STATUS UI
    function showSyncStatus(state) {
        const el = document.getElementById('sync-status');
        if(!el) return;
        if(state === 'syncing') {
            el.innerHTML = `<span class="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></span> Syncing...`;
            el.className = "absolute top-6 right-6 text-[10px] font-black uppercase tracking-widest px-4 py-1.5 rounded-full bg-slate-800/80 text-amber-400 border border-slate-700 flex items-center gap-2 z-20 backdrop-blur-md shadow-lg";
        } else if(state === 'synced') {
            el.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-400"></span> Cloud Synced`;
            el.className = "absolute top-6 right-6 text-[10px] font-black uppercase tracking-widest px-4 py-1.5 rounded-full bg-emerald-900/60 text-emerald-400 border border-emerald-800/50 flex items-center gap-2 z-20 shadow-[0_0_15px_rgba(16,185,129,0.3)] backdrop-blur-md";
        } else if(state === 'error') {
            el.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-500"></span> Offline Mode`;
            el.className = "absolute top-6 right-6 text-[10px] font-black uppercase tracking-widest px-4 py-1.5 rounded-full bg-red-900/60 text-red-400 border border-red-800/50 flex items-center gap-2 z-20 shadow-lg backdrop-blur-md";
        }
    }

    // TARGETED MOCK GENERATOR
    window.generateTopicMock = (parentSubject, targetTopic) => {
        let pool = [];
        Object.values(db).forEach(quiz => {
            if (quiz.subject === parentSubject && !quiz.title.includes("🎯")) {
                quiz.questions.forEach(q => {
                    if (q.tags && (q.tags.includes(targetTopic) || q.tags[1] === targetTopic || q.tags[0] === targetTopic)) {
                        pool.push(q);
                    }
                });
            }
        });
        
        if(pool.length === 0) return alert(`No questions found in vault for "${targetTopic}".`);
        
        const uniqueQs = Array.from(new Map(pool.map(q => [q.question, q])).values());
        const shuffled = uniqueQs.sort(() => 0.5 - Math.random()).slice(0, 30); 
        
        db['quiz_topic_practice'] = { 
            title: `🎯 ${targetTopic} Practice`, 
            subject: parentSubject, 
            timeInMinutes: Math.ceil(shuffled.length * 1.5), 
            questions: shuffled 
        };
        openLobby('quiz_topic_practice');
    };

    function renderDashboard() {
        const grid = document.getElementById('dashboard-grid'); 
        grid.innerHTML = '';
        
        SUBJECTS.forEach(subject => {
            const subjectQuizzes = Object.keys(db).filter(id => db[id].subject === subject && !db[id].title.includes("🎯"));
            
            // 🔥 V10.8 ANTI-BLEED MATRIX ENGINE 🔥
            let topics = {};
            historyDb.filter(h => h.subject === subject).forEach(h => {
                if(h.reviewData) {
                    h.reviewData.forEach(rd => {
                        let primaryTag = rd.tags && rd.tags.length > 0 ? rd.tags[0] : "General";
                        let secondaryTag = rd.tags && rd.tags.length > 1 ? rd.tags[1] : primaryTag;
                        
                        // ANTI-BLEED LOCK: For pure subjects (Economics), reject tags that belong to other subjects
                        if (subject !== "GS MOCK QUESTIONS" && subject !== "QUANT MOCK QUESTIONS" && subject !== "Miscellaneous") {
                            if (primaryTag.toUpperCase() !== subject.toUpperCase()) return; 
                        }

                        if(!topics[secondaryTag]) topics[secondaryTag] = { c: 0, t: 0 };
                        topics[secondaryTag].t++;
                        if(rd.status === 'correct') topics[secondaryTag].c++;
                    });
                }
            });

            // Generate Clickable Target Pills
            let matrixHTML = Object.keys(topics).map(t => {
                let acc = Math.round((topics[t].c / topics[t].t) * 100);
                let colorClasses = acc >= 80 ? 'text-emerald-700 bg-emerald-100 border-emerald-300 dark:text-emerald-400 dark:bg-emerald-900/30 dark:border-emerald-800' 
                                 : acc >= 50 ? 'text-amber-700 bg-amber-100 border-amber-300 dark:text-amber-400 dark:bg-amber-900/30 dark:border-amber-800' 
                                 : 'text-red-700 bg-red-100 border-red-300 dark:text-red-400 dark:bg-red-900/30 dark:border-red-800';
                return `<button onclick="generateTopicMock('${subject}', '${t}')" class="text-[9px] font-black uppercase ${colorClasses} border px-2.5 py-1.5 rounded-md shadow-sm cursor-pointer hover:scale-105 hover:shadow-md transition-all flex items-center gap-1" title="Practice ${t} questions">${t}: ${acc}% <span class="text-[8px] opacity-70">▶</span></button>`;
            }).join('');

            let listHTML = subjectQuizzes.map(id => `
                <div onclick="openLobby('${id}')" class="mt-2 bg-slate-50 dark:bg-slate-800 p-4 rounded-xl cursor-pointer border border-slate-200 dark:border-slate-700 hover:border-emerald-400 transition-colors shadow-sm">
                    <div class="font-bold text-sm text-slate-800 dark:text-slate-200 truncate">${db[id].title}</div>
                    <div class="text-[9px] font-black text-slate-400 uppercase mt-1.5 tracking-widest">${db[id].questions.length} Questions</div>
                </div>
            `).join('');

            const card = document.createElement('div');
            card.className = `bg-white dark:bg-slate-900 rounded-3xl p-6 md:p-8 shadow-lg border border-slate-200 dark:border-slate-800 flex flex-col subject-card`;
            card.innerHTML = `
                <div class="flex justify-between items-center mb-5 border-b border-slate-100 dark:border-slate-800/50 pb-3">
                    <h2 class="text-xl font-black uppercase tracking-tight text-slate-800 dark:text-slate-100">${subject}</h2>
                </div>
                ${(matrixHTML) ? `<div class="p-4 bg-slate-50 dark:bg-slate-950/50 rounded-2xl mb-5 border border-slate-100 dark:border-slate-800 shadow-inner"><div class="text-[10px] font-black uppercase text-slate-500 dark:text-slate-400 mb-3 tracking-widest flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span> Topic Heatmap (Click to Practice)</div><div class="flex flex-wrap gap-2">${matrixHTML}</div></div>` : ''}
                <div class="flex-1 overflow-y-auto max-h-56 space-y-1 mb-5 pr-2">${listHTML || '<div class="text-xs text-slate-400 font-bold italic py-4 text-center border-2 border-dashed border-slate-100 dark:border-slate-800 rounded-xl">Vault Empty</div>'}</div>
                <button onclick="triggerImport('${subject}')" class="mt-auto w-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 font-black text-[10px] uppercase tracking-widest py-3.5 rounded-xl transition-colors shadow-sm">➕ Add Custom Test</button>
            `;
            grid.appendChild(card);
        });
    }

    // DATA SYNC & UTILS
    function saveData() { 
        localStorage.setItem('megaQuizDB_v7', JSON.stringify(db)); 
        localStorage.setItem('megaQuizHistory_v7', JSON.stringify(historyDb)); 
        
        // Cloud Sync Protocol
        showSyncStatus('syncing');
        fetch(CLOUD_URL, {
            method: 'POST', mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' }, 
            body: JSON.stringify({ subjects: SUBJECTS, db: db, history: historyDb })
        }).then(() => showSyncStatus('synced')).catch(() => showSyncStatus('error'));
    }

    async function initializeSystem() {
        if(localStorage.getItem('megaTheme') === 'dark') document.documentElement.classList.add('dark');
        if(localStorage.getItem('megaQuizDB_v7')) db = JSON.parse(localStorage.getItem('megaQuizDB_v7')); 
        if(localStorage.getItem('megaQuizHistory_v7')) historyDb = JSON.parse(localStorage.getItem('megaQuizHistory_v7')); 
        renderDashboard();
        
        showSyncStatus('syncing');
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 8000); 
            const response = await fetch(CLOUD_URL, { signal: controller.signal });
            clearTimeout(timeoutId);
            const data = await response.json();
            if (data && data.db) { db = data.db; historyDb = data.history || []; renderDashboard(); showSyncStatus('synced'); } 
            else showSyncStatus('error');
        } catch (error) { showSyncStatus('error'); }
    }
    
    // BACKUP & RESTORE
    window.exportBackup = () => { const blob = new Blob([JSON.stringify({ db: db, history: historyDb })], { type: "application/json" }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `MegaHub_Backup_${Date.now()}.json`; a.click(); };
    window.triggerRestore = () => { if(prompt("Enter Master Password:")==="KOBE") document.getElementById('backup-file-input').click(); else alert("Access Denied."); };
    document.getElementById('backup-file-input').onchange = e => { const r = new FileReader(); r.onload = ev => { const d = JSON.parse(ev.target.result); db = d.db; historyDb = d.history; saveData(); alert("Backup Restored!"); location.reload(); }; r.readAsText(e.target.files[0]); };
    
    // IMPORTING
    window.triggerImport = (s) => { targetSub = s; if(prompt("Enter Master Password:")==="KOBE") document.getElementById('global-file-input').click(); else alert("Access Denied."); };
    document.getElementById('global-file-input').onchange = e => { const r = new FileReader(); r.onload = ev => { const q = JSON.parse(ev.target.result); q.subject = targetSub; db['q_'+Date.now()] = q; saveData(); renderDashboard(); }; r.readAsText(e.target.files[0]); e.target.value = ''; };
    
    // NAVIGATION
    function showScreen(s) { ['dashboard','lobby','quiz','screen-analytics'].forEach(x=>document.getElementById(x).classList.add('hidden')); document.getElementById(s === 'analytics' ? 'screen-analytics' : 'screen-'+s).classList.remove('hidden'); }
    window.openLobby = (id) => { currentQuizId = id; document.getElementById('lobby-title').textContent = db[id].title; showScreen('lobby'); window.scrollTo(0,0); };
    
    function startQuizFromLobby() {
        activeQuestions = [...db[currentQuizId].questions]; quizState = { answers: {} };
        const c = document.getElementById('quiz-container'); c.innerHTML = '';
        activeQuestions.forEach((q, i) => {
            c.innerHTML += `
                <div class="bg-white dark:bg-slate-900 p-6 md:p-10 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-md">
                    <div class="text-xs font-black text-emerald-500 uppercase tracking-widest mb-6 bg-emerald-50 dark:bg-emerald-900/20 inline-block px-3 py-1 rounded">Question ${i+1}</div>
                    <div class="text-lg md:text-xl font-bold mb-8 text-slate-800 dark:text-slate-100 leading-relaxed">${q.question}</div>
                    <div class="space-y-3">
                        ${q.options.map((o,oi)=> `<div id="opt-${i}-${oi}" onclick="selectOption(${i}, ${oi})" class="p-5 border-2 border-slate-100 dark:border-slate-800 rounded-xl cursor-pointer hover:border-emerald-400 dark:hover:border-emerald-500 bg-slate-50 dark:bg-slate-800/50 font-bold text-sm text-slate-700 dark:text-slate-300 transition-all">${o.text}</div>`).join('')}
                    </div>
                </div>`;
        }); 
        showScreen('quiz'); window.scrollTo(0,0);
    }

    window.selectOption = (qIdx, oIdx) => {
        quizState.answers[qIdx] = oIdx;
        activeQuestions[qIdx].options.forEach((_, i) => {
            const el = document.getElementById(`opt-${qIdx}-${i}`);
            if (i === oIdx) {
                el.className = 'p-5 border-2 border-emerald-500 rounded-xl cursor-pointer bg-emerald-50 dark:bg-emerald-900/30 font-bold text-sm text-emerald-900 dark:text-emerald-100 transition-all shadow-md transform scale-[1.01]';
            } else {
                el.className = 'p-5 border-2 border-slate-100 dark:border-slate-800 rounded-xl cursor-pointer hover:border-emerald-400 bg-slate-50 dark:bg-slate-800/50 font-bold text-sm text-slate-700 dark:text-slate-300 transition-all';
            }
        });
    };

    function submitQuiz() {
        if(Object.keys(quizState.answers).length === 0 && !confirm("You haven't answered any questions. Submit anyway?")) return;
        
        let rev = []; 
        activeQuestions.forEach((q, i) => { 
            let s = (quizState.answers[i] !== undefined && q.options[quizState.answers[i]].correct) ? 'correct' : 'wrong'; 
            rev.push({status: s, tags: q.tags}); 
        });
        
        historyDb.unshift({ subject: db[currentQuizId].subject, reviewData: rev }); 
        saveData(); 
        showScreen('dashboard'); 
        renderDashboard(); 
        window.scrollTo(0,0);
    }
    
    function toggleDarkMode() { 
        document.documentElement.classList.toggle('dark'); 
        localStorage.setItem('megaTheme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    }
    
    function showAnalytics() { 
        showScreen('analytics');
        document.getElementById('mastery-grid').innerHTML = '<div class="text-slate-400 text-center font-bold uppercase tracking-widest mt-10">Use the Mini-Matrix on the Dashboard for Localized Stats.</div>';
    }
    function closeAnalytics() { showScreen('dashboard'); }

    initializeSystem();
</script>
</body>
</html>
